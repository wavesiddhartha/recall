<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      margin: 0;
      padding: 24px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: #ffffff;
      color: #111111;
      text-align: left;
    }
    .header {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
      border-bottom: 1px solid #eeeeee;
      padding-bottom: 8px;
    }
    .status {
      font-size: 11px;
      color: #666666;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: #00ff00;
      border-radius: 50%;
      margin-right: 4px;
    }
    .btn {
      display: block;
      width: 100%;
      text-align: center;
      background-color: #111111;
      color: #ffffff;
      border: none;
      padding: 10px 0;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.2s ease;
    }
    .btn:hover {
      background-color: #333333;
    }
    .footer {
      margin-top: 20px;
      font-size: 9px;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="header">Recall</div>
  <div class="status">
    <span class="status-dot"></span> Active and ready.<br>
    Local-first history bridge.
  </div>
  <a href="http://localhost:5173" target="_blank" class="btn" id="open-app">Open Recall App</a>
  <div class="footer">v1.0.0 • Local Only</div>

  <script src="popup.js"></script>
</body>
</html>
